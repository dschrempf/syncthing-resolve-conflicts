name: CI

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    environment: CI
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v17
        with:
          name: syncthing-resolve-conflicts
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - run: nix flake check
